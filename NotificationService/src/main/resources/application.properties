# Server Port
server.port=8085

# Application Name
spring.application.name=notification-service

# Eureka Client Coordinates
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Kafka Consumer Configurations
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Trust all packages for JSON deserialization to avoid package namespace exceptions
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.ecommerce.notificationservice.dto.OrderPlacedEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# Enable actuator health metrics
management.endpoints.web.exposure.include=health
