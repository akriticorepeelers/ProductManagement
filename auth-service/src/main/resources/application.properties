# Server Port
server.port=8081

# Application Name
spring.application.name=auth-service

# Database Configuration (authdb)
spring.datasource.url=jdbc:mysql://localhost:3306/authdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Eureka client settings
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Keycloak Server Settings
keycloak.auth-server-url=http://localhost:8180
keycloak.realm=ecommerce-realm
keycloak.client-id=ecommerce-cli
# Default client secret for Keycloak client authentication
keycloak.client-secret=my-client-secret

# Keycloak Admin Credentials (used by Auth Service to register users in the realm)
keycloak.admin.username=admin
keycloak.admin.password=admin
keycloak.admin.client-id=admin-cli
keycloak.admin.realm=master

# Enable actuator health metrics
management.endpoints.web.exposure.include=health
