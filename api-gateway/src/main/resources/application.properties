# Gateway Server Port
server.port=8080

# Application Name
spring.application.name=api-gateway

# Eureka Service Discovery Settings
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Spring Cloud Gateway Configuration
# 1. Routing for Auth Service (No security filter needed at gateway, auth-service will forward to Keycloak)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

# 2. Routing for Product Service (With TokenRelay filter to forward Keycloak JWT token)
spring.cloud.gateway.routes[1].id=product-service
spring.cloud.gateway.routes[1].uri=lb://product-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/products/**
spring.cloud.gateway.routes[1].filters[0]=TokenRelay

# 3. Routing for Inventory Service (With TokenRelay filter to forward Keycloak JWT token)
spring.cloud.gateway.routes[2].id=inventory-service
spring.cloud.gateway.routes[2].uri=lb://inventory-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/inventory/**
spring.cloud.gateway.routes[2].filters[0]=TokenRelay

# 4. Routing for Order Service (With TokenRelay filter to forward Keycloak JWT token)
spring.cloud.gateway.routes[3].id=order-service
spring.cloud.gateway.routes[3].uri=lb://order-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/orders/**
spring.cloud.gateway.routes[3].filters[0]=TokenRelay

# Keycloak Issuer URI
# Gateway uses this URI to connect to Keycloak, retrieve public JWK keys, and validate JWTs
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/ecommerce-realm

# Enable actuator health endpoint
management.endpoints.web.exposure.include=health
